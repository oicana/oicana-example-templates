name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate-links:
    name: Check for dead links in docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check readme links
        run: npx linkinator README.md

  check-format:
    name: check typst files format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: typstyle
      - name: check format
        run: typstyle templates --diff -v

  validate:
    name: validate templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: oicana_cli@0.1.0-alpha.9
      - name: validate all templates
        run: oicana validate -a

  tests:
    name: run template tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: oicana_cli@0.1.0-alpha.9
      - name: run template tests
        run: oicana test -a
